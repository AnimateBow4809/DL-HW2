data:
  dataset: "fashion" # mnist or fashion
  mnist_path: '../data/dataset/normal/mnist.pkl'
  fashion_path: '../data/dataset/fashion'
  batch_size: 256

model:
  device: "cpu"
  arch: "c" # options: a,b,c
  epochs: 5
  early_stopping: false
  path : '../models/saved/fashion_model_c.pth' # path to model checkpoint or null
  freeze_backbone : true # freeze model backbone
optimizer:
  momentum: 0
  l2_penalty: 0.0001
  lr: 0.01
