data:
  dataset: "mnist" # or fashion
  dataset_path: '../data/dataset/normal/mnist.pkl' # '../data/dataset/fashion' or '../data/dataset/normal/mnist.pkl'
  normalize: false
  standardize: true
  batch_size: 256

model:
  device: "cpu"
  arch: "b" # options: a,b,c
  epochs: 5
  early_stopping: true
optimizer:
  momentum: 0
  l2_penalty: 0.0001
  lr: 0.01
